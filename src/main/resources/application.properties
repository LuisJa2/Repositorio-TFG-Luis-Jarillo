spring.application.name=ArenaMix

# Railway inyecta PORT automáticamente; en local usa 8080
server.port=${PORT:8080}

# Base de datos — credenciales via variables de entorno obligatorias (ver application.properties.example)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secreto=${JWT_SECRET}
jwt.expiracion.ms=86400000
